<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="admin" data-protected="admin">
  <header class="app-header">
    <a class="brand" href="admin.html"><span class="brand-mark">$</span><span>FinTrack Admin</span></a>
    <nav class="app-nav">
      <a class="active" href="admin.html">Admin Panel</a>
    </nav>
    <button class="btn btn-secondary" id="logoutBtn" type="button">Logout</button>
  </header>

  <main class="app-shell">
    <section class="page-title">
      <div>
        <span class="eyebrow">Admin access</span>
        <h1>User spending control panel</h1>
      </div>
      <button class="btn btn-secondary" id="adminResetBtn" type="button">Reset Database</button>
    </section>
    <section class="summary-grid dashboard-summary">
      <article class="summary-card"><span>Total Records</span><strong id="adminRecordCount">0</strong></article>
      <article class="summary-card"><span>Exact User Spending</span><strong id="adminExpense">$0</strong></article>
      <article class="summary-card"><span>Highest Category</span><strong id="adminTopCategory">$0</strong></article>
      <article class="summary-card"><span>Net Balance</span><strong id="adminBalance">$0</strong></article>
    </section>

    <section class="admin-grid">
      <article class="panel">
        <h2>Spending Insights</h2>
        <div class="insight-grid">
          <div class="insight-box">
            <span>Average expense</span>
            <strong id="adminAverageExpense">$0</strong>
          </div>
          <div class="insight-box">
            <span>Highest month</span>
            <strong id="adminTopMonth">No data</strong>
          </div>
          <div class="insight-box">
            <span>Total income</span>
            <strong id="adminIncome">$0</strong>
          </div>
          <div class="insight-box">
            <span>Loan exposure</span>
            <strong id="adminLoanExposure">$0</strong>
          </div>
        </div>
      </article>

      <article class="panel">
        <h2>Category Spending</h2>
        <div class="analytics-list" id="adminCategoryBreakdown"></div>
      </article>
    </section>

    <section class="panel admin-filter-panel">
      <div class="panel-heading">
        <h2>Exact User Records</h2>
        <div class="filter-row">
          <input id="adminSearch" type="search" placeholder="Search title, note, category">
          <select id="adminTypeFilter">
            <option value="all">All records</option>
            <option value="expense">Only spending</option>
            <option value="income">Only income</option>
            <option value="lent">Only lent money</option>
            <option value="borrowed">Only borrowed money</option>
          </select>
          <input id="adminMonthFilter" type="month">
        </div>
      </div>
      <div class="record-list" id="adminRecords"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
