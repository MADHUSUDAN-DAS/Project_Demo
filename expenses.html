<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Records</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="expense" data-protected="user">
  <header class="app-header">
    <a class="brand" href="dashboard.html"><span class="brand-mark">$</span><span>FinTrack</span></a>
    <nav class="app-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="income.html">Income</a>
      <a class="active" href="expenses.html">Expenses</a>
      <a href="lending.html">Lending</a>
      <a href="reports.html">Reports</a>
    </nav>
    <button class="btn btn-secondary" id="logoutBtn" type="button">Logout</button>
  </header>

  <main class="app-shell two-column">
    <section class="panel">
      <span class="eyebrow">Expense page</span>
      <h1>Add expense</h1>
      <form class="data-form" data-record-form data-type="expense">
        <label>Title<input name="title" type="text" placeholder="Rent, food, travel" required></label>
        <label>Amount<input name="amount" type="number" min="1" placeholder="1500" required></label>
        <label>Category
          <select name="category" required>
            <option value="Housing">Housing</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Bills">Bills</option>
            <option value="Health">Health</option>
            <option value="Shopping">Shopping</option>
            <option value="Education">Education</option>
            <option value="Other">Other</option>
          </select>
        </label>
        <label>Month<input name="month" type="month" required></label>
        <label>Note<textarea name="note" placeholder="Optional note"></textarea></label>
        <button class="btn btn-primary" type="submit">Save Expense</button>
      </form>
    </section>
    <section class="panel">
      <h2>Expense records</h2>
      <div class="record-list" id="pageRecords"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
